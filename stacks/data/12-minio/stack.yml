version: "3.9"

# ============================================================
# Stack: MinIO — Object Storage S3-compatible
# ============================================================
# Nodo:    master2 (tier=compute, NVMe + HDD 2TB)
# Storage: /srv/datalake/minio  (HDD 2TB — datos fríos masivos)
# API:     https://minio-api.sexydad  (S3 API endpoint)
# UI:      https://minio.sexydad      (Console web)
#
# Credenciales vía secrets:
#   minio_access_key  → MINIO_ROOT_USER  (también = AWS_ACCESS_KEY_ID)
#   minio_secret_key  → MINIO_ROOT_PASSWORD (también = AWS_SECRET_ACCESS_KEY)
#
# Uso en Spark / PySpark (s3a://):
#   spark.hadoop.fs.s3a.endpoint=http://minio:9000
#   spark.hadoop.fs.s3a.access.key=<minio_access_key>
#   spark.hadoop.fs.s3a.secret.key=<minio_secret_key>
#   spark.hadoop.fs.s3a.path.style.access=true
#
# Buckets iniciales (crear via UI o mc tras deploy):
#   lab-datasets   → datos crudos (CSV, JSON, Parquet)
#   lab-artifacts  → modelos entrenados, checkpoints
#   lab-notebooks  → exports de notebooks
#   airflow-logs   → logs de tareas Airflow
#   spark-warehouse→ Delta Lake / Spark SQL warehouse
# ============================================================

networks:
  public:
    external: true
  internal:
    external: true

secrets:
  minio_access_key:
    external: true
  minio_secret_key:
    external: true

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    hostname: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
      # Región estándar para compatibilidad con boto3/s3fs
      MINIO_SITE_REGION: us-east-1
      # Nombre del sitio (informativo)
      MINIO_SITE_NAME: lab-minio
      # Habilitar métricas Prometheus (útil en fase de observabilidad)
      MINIO_PROMETHEUS_AUTH_TYPE: public

    secrets:
      - minio_access_key
      - minio_secret_key

    volumes:
      # HDD 2TB: datos masivos (datasets, modelos, artefactos)
      - /srv/datalake/minio:/data

    networks:
      - public
      - internal

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == compute
          - node.hostname == master2
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public

        # ── Console UI: https://minio.sexydad ──────────────────
        - traefik.http.routers.minio-console.rule=Host(`minio.sexydad`)
        - traefik.http.routers.minio-console.entrypoints=websecure
        - traefik.http.routers.minio-console.tls=true
        - traefik.http.routers.minio-console.service=minio-console
        - traefik.http.services.minio-console.loadbalancer.server.port=9001
        - traefik.http.routers.minio-console.middlewares=lan-whitelist@docker

        # ── S3 API: https://minio-api.sexydad ──────────────────
        # (Spark, boto3, s3fs, mc apuntan aquí)
        - traefik.http.routers.minio-api.rule=Host(`minio-api.sexydad`)
        - traefik.http.routers.minio-api.entrypoints=websecure
        - traefik.http.routers.minio-api.tls=true
        - traefik.http.routers.minio-api.service=minio-api
        - traefik.http.services.minio-api.loadbalancer.server.port=9000
        - traefik.http.routers.minio-api.middlewares=lan-whitelist@docker

        # Health check en API
        - traefik.http.services.minio-api.loadbalancer.healthcheck.path=/minio/health/live
        - traefik.http.services.minio-api.loadbalancer.healthcheck.interval=30s

        # Metadata
        - "com.docker.stack.namespace=minio"
        - "description=MinIO S3-compatible object storage"
