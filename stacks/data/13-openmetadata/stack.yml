version: "3.9"

# ============================================================
# Stack: OpenMetadata 1.4 — Data Catalog + Lineage + Quality
# ============================================================
# Node:     master1 (tier=control)
# URL:      https://openmetadata.sexydad
#
# Architecture:
#   openmetadata-server  → main API + UI (Java)
#   openmetadata-mysql   → internal metadata store (MySQL 8)
#   openmetadata-es      → dedicated OpenSearch 2.x for this stack
#
# WHY a dedicated OpenSearch instead of sharing opensearch_opensearch:
#   OpenMetadata's Java NIO async HTTP client (Apache HttpComponents) is
#   incompatible with Docker Swarm VIP/DNAT routing. curl works fine to the
#   Swarm VIP (10.0.2.26) but Java NIO connect() fails. The only reliable fix
#   is to run OpenSearch as a service INSIDE this stack so that DNS resolves
#   to the actual task IP (not a VIP), bypassing DNAT entirely.
#   See: ADR-007, stacks/data/11-opensearch/ (used by other stacks for logs).
#
# Connected services (configured post-deploy via UI or ingestion):
#   - Postgres   → databases: n8n, airflow, rag, openwebui
#   - MinIO      → buckets: bronze, silver, gold, governance
#   - Airflow    → DAGs + OpenLineage events
#
# Secrets required:
#   om_admin_password       → OpenMetadata admin UI password
#   om_mysql_root_password  → MySQL root password
#   om_mysql_user_password  → MySQL 'openmetadata' user password
#
# Config required (auto-created by Docker Swarm at deploy time from file:):
#   openmetadata-env-v3    → Docker Config sourced before JVM start
#                            (mounted at /opt/openmetadata/conf/openmetadata-env.sh)
#
# First deploy:
#   1. Run: bash scripts/governance/setup-governance.sh
#   2. Deploy: docker stack deploy -c stacks/data/13-openmetadata/stack.yml openmetadata
#   3. Wait ~2 min for openmetadata-es to become healthy
#   4. Open: https://openmetadata.sexydad
#   5. Login: admin / <om_admin_password>
#   6. Configure connectors (see README.md)
# ============================================================

networks:
  public:
    external: true
  internal:
    external: true

secrets:
  om_admin_password:
    external: true
  om_mysql_root_password:
    external: true
  om_mysql_user_password:
    external: true

configs:
  openmetadata-env-v3:
    file: ./openmetadata-env.sh

services:

  # ── OpenSearch — dedicated search index for OpenMetadata ───
  # WHY dedicated: Java NIO async client (Apache HttpComponents) cannot
  # connect through Docker Swarm VIP/DNAT. Running OpenSearch inside this
  # stack ensures DNS resolves to the task IP directly (no VIP hop).
  #
  # WHY endpoint_mode: dnsrr:
  #   By default Swarm uses VIP mode — DNS resolves to a virtual IP that
  #   DNAT-forwards to the actual task. Java NIO async (non-blocking) connect()
  #   works with direct TCP but fails through Swarm DNAT/VIP (Connection refused
  #   even when wget/sync curl works fine).
  #   dnsrr disables the VIP entirely — DNS returns the task's real IP directly.
  #   This is safe for single-replica services where no load-balancing is needed.
  openmetadata-es:
    image: opensearchproject/opensearch:2.19.1
    hostname: openmetadata-es

    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      # -Djava.net.preferIPv4Stack=true forces OpenSearch JVM to bind on IPv4
      # (0.0.0.0) instead of IPv6 (::). Without this flag the kernel default
      # IPV6_V6ONLY=1 causes the socket to bind only on '::' and Java NIO async
      # connect() from openmetadata-server fails with Connection refused even
      # though sync wget/curl work fine through the IPv6 socket.
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m -Djava.net.preferIPv4Stack=true"
      TZ: America/Bogota

    volumes:
      - /srv/fastdata/openmetadata/opensearch:/usr/share/opensearch/data

    networks:
      - internal

    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 768M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 60s

  # ── MySQL — OpenMetadata metadata backend ──────────────────
  openmetadata-mysql:
    image: mysql:8.0
    hostname: openmetadata-mysql

    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/om_mysql_root_password
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: openmetadata
      MYSQL_PASSWORD_FILE: /run/secrets/om_mysql_user_password

    secrets:
      - om_mysql_root_password
      - om_mysql_user_password

    volumes:
      - /srv/fastdata/openmetadata/mysql:/var/lib/mysql

    networks:
      - internal

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 60s

  # ── OpenMetadata Server ─────────────────────────────────────
  openmetadata-server:
    image: openmetadata/server:1.4.7
    hostname: openmetadata-server
    depends_on:
      - openmetadata-mysql
      - openmetadata-es

    environment:
      # Database connection
      # NOTE: DB_USER_PASSWORD is injected by the openmetadata-env Docker Config
      # which is sourced by openmetadata-server-start.sh before the JVM starts.
      # OpenMetadata 1.4 does NOT support the Docker _FILE env var convention.
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_HOST: openmetadata-mysql
      DB_PORT: "3306"
      OM_DATABASE: openmetadata_db
      DB_USER: openmetadata

      # Server config
      SERVER_HOST_API_URL: https://openmetadata.sexydad/api
      OPENMETADATA_SERVER_URL: https://openmetadata.sexydad

      # Search — dedicated OpenSearch service within this stack.
      # IMPORTANT: must NOT point to opensearch_opensearch (cross-stack VIP).
      # openmetadata.yaml reads ELASTICSEARCH_* vars (not SEARCH_*).
      # SEARCH_TYPE is the only env var that uses the SEARCH_ prefix.
      SEARCH_TYPE: opensearch
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http

      # Auth — basic (no SSO for lab)
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: '["https://openmetadata.sexydad/api/v1/system/config/jwks"]'
      AUTHENTICATION_AUTHORITY: https://openmetadata.sexydad
      AUTHENTICATION_CLIENT_ID: open-metadata
      AUTHENTICATION_CALLBACK_URL: https://openmetadata.sexydad/callback

      # Admin bootstrap
      AUTHORIZER_ADMIN_PRINCIPALS: '["admin"]'
      AUTHORIZER_PRINCIPAL_DOMAIN: lab.local

      # JVM options — force IPv4 stack on the OM server JVM.
      # The Apache HttpComponents async NIO client (RestHighLevelClient) uses
      # Java NIO SocketChannelImpl.finishConnect() which fails with
      # Connection refused on overlay networks when the kernel resolves to
      # an IPv6 address or uses IPv6 NIO internally, even if the target IP is
      # IPv4. -Djava.net.preferIPv4Stack=true forces ALL JVM network IO to
      # use IPv4, unblocking the async HTTP client used for OpenSearch indexing.
      OPENMETADATA_OPTS: "-Djava.net.preferIPv4Stack=true"

      # Pipeline service (Airflow)
      # Disabled entirely — standard apache/airflow image lacks the
      # openmetadata-managed-apis plugin required by AirflowRESTClient.
      # When disabled, PipelineServiceStatusJob does not run (no log spam).
      # Ingestion still works via OpenMetadata Python SDK running inside DAGs.
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://airflow_airflow_webserver:8080
      PIPELINE_SERVICE_CLIENT_CLASS_NAME: "org.openmetadata.service.clients.pipeline.noop.NoopClient"
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: "no-ssl"

      TZ: America/Bogota

    secrets:
      - om_admin_password
      - om_mysql_user_password

    configs:
      # Mount the env injection script over the empty openmetadata-env.sh.
      # The start script sources this file, which reads secret files and
      # exports DB_USER_PASSWORD + ADMIN_PASSWORD before the JVM starts.
      - source: openmetadata-env-v3
        target: /opt/openmetadata/conf/openmetadata-env.sh
        mode: 0755

    # NOTE: Do NOT mount a volume over /opt/openmetadata/conf — it overwrites
    # the internal openmetadata.yaml config bundled in the image and crashes on start.
    # Only MySQL needs a persistent volume.

    networks:
      - internal
      - public

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.openmetadata.rule=Host(`openmetadata.sexydad`)
        - traefik.http.routers.openmetadata.entrypoints=websecure
        - traefik.http.routers.openmetadata.tls=true
        - traefik.http.routers.openmetadata.service=openmetadata
        - traefik.http.services.openmetadata.loadbalancer.server.port=8585
        - traefik.http.routers.openmetadata.middlewares=lan-whitelist@docker
        - traefik.http.services.openmetadata.loadbalancer.healthcheck.path=/api/v1/system/version
        - traefik.http.services.openmetadata.loadbalancer.healthcheck.interval=30s
        - traefik.http.services.openmetadata.loadbalancer.healthcheck.timeout=10s
        - "com.docker.stack.namespace=openmetadata"
        - "description=OpenMetadata — Data catalog, lineage and quality"
