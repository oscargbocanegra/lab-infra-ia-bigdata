version: "3.9"

# ============================================================
# Stack: Apache Spark 3.5 — Procesamiento distribuido
# ============================================================
# Arquitectura:
#   spark_master  → master1 (tier=control) — coordinador ligero
#   spark_worker  → master2 (tier=compute) — CPU/RAM/NVMe/HDD
#
# Integración:
#   PySpark desde Jupyter  → spark://spark-master:7077
#   Airflow SparkSubmitOperator → misma URL
#   Delta Lake vía s3a://  → MinIO como backend de storage
#
# History Server:
#   Guarda logs de jobs completados en MinIO (s3a://spark-warehouse/history)
#   UI en https://spark-history.sexydad
#
# URLs:
#   https://spark-master.sexydad   → Spark Master UI
#   https://spark-history.sexydad  → History Server UI
#
# Secrets requeridos:
#   minio_access_key  → para que Spark acceda a MinIO (s3a)
#   minio_secret_key
#
# NOTA sobre imagen:
#   Usamos apache/spark:3.5.3 (imagen oficial ASF).
#   bitnami/spark fue removida de Docker Hub cuando Broadcom adquirió VMware.
#   Paths en apache/spark: /opt/spark/ (vs /opt/bitnami/spark/ de bitnami).
#   IMPORTANTE: hostname debe usar guión (spark-master), NO underscore.
#   Spark valida el hostname como URL Java y rechaza underscores.
# ============================================================

networks:
  public:
    external: true
  internal:
    external: true

# NOTA: Sin secrets en este stack — S3AFileSystem no está incluida en apache/spark:3.5.3
# Si se agrega hadoop-aws.jar en el futuro, agregar secrets minio_access_key y minio_secret_key

# ── Variables de entorno S3A/MinIO + Spark comunes ───────────
x-spark-env: &spark-env
  # ── MinIO / S3A ──────────────────────────────────────────
  # NOTA: S3AFileSystem NO está incluida en apache/spark:3.5.3
  # Los logs del History Server usan filesystem local montado en volumen.
  # Si en el futuro se agrega hadoop-aws.jar, descomentar las líneas S3A.
  # SPARK_HADOOP_FS_S3A_ENDPOINT: http://minio:9000
  # SPARK_HADOOP_FS_S3A_PATH_STYLE_ACCESS: "true"
  # SPARK_HADOOP_FS_S3A_IMPL: org.apache.hadoop.fs.s3a.S3AFileSystem
  # SPARK_HADOOP_FS_S3A_AWS_CREDENTIALS_PROVIDER: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
  # ── Delta Lake ───────────────────────────────────────────
  SPARK_CONF_spark_sql_extensions: io.delta.sql.DeltaSparkSessionExtension
  SPARK_CONF_spark_sql_catalog_spark_catalog: org.apache.spark.sql.delta.catalog.DeltaCatalog
  # ── History Server ───────────────────────────────────────
  # Logs en filesystem local (volumen bind mount en /srv/fastdata/spark-history)
  SPARK_CONF_spark_eventLog_enabled: "true"
  SPARK_CONF_spark_eventLog_dir: /opt/spark/history
  # ── Logging ──────────────────────────────────────────────
  SPARK_NO_DAEMONIZE: "true"

services:

  # ── Spark Master ─────────────────────────────────────────────
  spark_master:
    image: apache/spark:3.5.3
    # IMPORTANTE: usar guión, NO underscore — Spark valida el hostname
    # como URL Java válida y rechaza underscores con "Invalid master URL"
    hostname: spark-master
    user: root

    # Arranca el master en foreground usando spark-class directamente
    # eventLog dir: filesystem local compartido con history server vía volumen
    command: ["bash", "-c", "mkdir -p /opt/spark/history && exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080"]

    environment:
      <<: *spark-env
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"

    networks:
      - internal
      - public

    volumes:
      # Directorio compartido con history server para event logs
      - /srv/fastdata/spark-history:/opt/spark/history

    deploy:
      replicas: 1
      placement:
        constraints:
          # master1: liviano, 25GB RAM libres, no compite con GPU workloads
          - node.labels.tier == control
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.spark-master.rule=Host(`spark-master.sexydad`)
        - traefik.http.routers.spark-master.entrypoints=websecure
        - traefik.http.routers.spark-master.tls=true
        - traefik.http.routers.spark-master.service=spark-master
        - traefik.http.services.spark-master.loadbalancer.server.port=8080
        - traefik.http.routers.spark-master.middlewares=lan-whitelist@docker
        - "com.docker.stack.namespace=spark"
        - "description=Spark Master coordinator"

  # ── Spark Worker ─────────────────────────────────────────────
  spark_worker:
    image: apache/spark:3.5.3
    # IMPORTANTE: usar guión, NO underscore
    hostname: spark-worker
    user: root

    # Arranca el worker en foreground — spark-class es el proceso principal
    # La URL del master usa guión (spark-master) para que Java la acepte como hostname válido
    command: ["bash", "-c", "mkdir -p /opt/spark/history && exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8081 spark://spark-master:7077"]

    environment:
      <<: *spark-env
      SPARK_WORKER_WEBUI_PORT: "8081"
      # Recursos que el worker ofrece al master
      # 10 CPUs y 14GB: deja headroom para Jupyter+Ollama+MinIO
      SPARK_WORKER_CORES: "10"
      SPARK_WORKER_MEMORY: "14g"

    networks:
      - internal
      - public

    volumes:
      # Scratch local para shuffle y spill a NVMe (máximo rendimiento)
      - /srv/fastdata/spark-tmp:/opt/spark/work
      # Acceso directo al datalake HDD (lectura de datasets locales)
      - /srv/datalake/datasets:/data/datasets:ro
      # Directorio compartido de event logs
      - /srv/fastdata/spark-history:/opt/spark/history

    deploy:
      replicas: 1
      placement:
        constraints:
          # master2: el compute node, NVMe para shuffle/spill
          - node.labels.tier == compute
          - node.hostname == master2
      resources:
        limits:
          cpus: '12.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 2G
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.spark-worker.rule=Host(`spark-worker.sexydad`)
        - traefik.http.routers.spark-worker.entrypoints=websecure
        - traefik.http.routers.spark-worker.tls=true
        - traefik.http.routers.spark-worker.service=spark-worker
        - traefik.http.services.spark-worker.loadbalancer.server.port=8081
        - traefik.http.routers.spark-worker.middlewares=lan-whitelist@docker
        - "com.docker.stack.namespace=spark"
        - "description=Spark Worker compute node"

  # ── Spark History Server ──────────────────────────────────────
  spark_history:
    image: apache/spark:3.5.3
    hostname: spark-history
    user: root

    # NOTA: apache/spark:3.5.3 NO incluye hadoop-aws → no puede usar s3a://
    # Los event logs se leen del filesystem local (bind mount compartido con master/worker)
    command: ["bash", "-c", "mkdir -p /opt/spark/history && export SPARK_HISTORY_OPTS='-Dspark.history.fs.logDirectory=/opt/spark/history' && exec /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer"]

    environment:
      <<: *spark-env

    networks:
      - internal
      - public

    volumes:
      # Lee los event logs escritos por master/worker desde master1
      - /srv/fastdata/spark-history:/opt/spark/history:ro

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.spark-history.rule=Host(`spark-history.sexydad`)
        - traefik.http.routers.spark-history.entrypoints=websecure
        - traefik.http.routers.spark-history.tls=true
        - traefik.http.routers.spark-history.service=spark-history
        - traefik.http.services.spark-history.loadbalancer.server.port=18080
        - traefik.http.routers.spark-history.middlewares=lan-whitelist@docker
        - "com.docker.stack.namespace=spark"
        - "description=Spark History Server - job audit"
