# ============================================================
# Fluent Bit Configuration — Lab Infra AI + Big Data
# ============================================================
# Pipeline: Docker logs → parse JSON → enrich → OpenSearch
# Index:    docker-logs-YYYY.MM.DD  (daily rollover)
# Retention: 7 days via OpenSearch ISM policy
# ============================================================

[SERVICE]
    # How often Fluent Bit flushes buffers to outputs (seconds)
    Flush         5
    # Log level: off | error | warn | info | debug | trace
    Log_Level     warn
    # Daemon mode: off (Docker manages the process)
    Daemon        Off
    # Custom parsers file
    Parsers_File  /fluent-bit/etc/parsers_docker.conf
    # Health check endpoint
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================================
# INPUT: Tail all Docker container log files on this node
# ============================================================
[INPUT]
    Name              tail
    Tag               docker.*
    # Read ALL containers on this node
    Path              /var/lib/docker/containers/*/*.log
    # Use Docker JSON parser (defined in parsers_docker.conf)
    Parser            docker_json
    # State DB: remembers file offsets — survives restarts without re-reading
    DB                /fluent-bit/state/docker-tail.db
    # Skip lines longer than 512KB (avoids OOM on huge stack traces)
    Skip_Long_Lines   On
    # Refresh interval for new containers (seconds)
    Refresh_Interval  10
    # Buffer size per file
    Buffer_Max_Size   5MB
    # Do not read historical logs on first run — only new logs from now
    Read_from_Head    False

# ============================================================
# FILTER 1: Add node hostname to every record
# HOSTNAME is injected by Docker from /etc/hostname bind mount
# ============================================================
[FILTER]
    Name         record_modifier
    Match        docker.*
    Record       node ${HOSTNAME}

# ============================================================
# FILTER 2: Extract container_id (first 12 chars) from tag
# Tag format: docker.var.lib.docker.containers.<full-id>.<full-id>-json
# The Lua script parses the tag and adds container_id field.
# ============================================================
[FILTER]
    Name         lua
    Match        docker.*
    call         extract_container_id
    code         function extract_container_id(tag, timestamp, record) local id = tag:match("containers%.([a-f0-9]+)%.") if id then record["container_id"] = string.sub(id, 1, 12) end return 1, timestamp, record end

# ============================================================
# FILTER 3: Remove internal Fluent Bit partial-line flag
# _p is a Fluent Bit internal marker — not useful in OpenSearch
# ============================================================
[FILTER]
    Name         record_modifier
    Match        docker.*
    Remove_key   _p

# ============================================================
# OUTPUT: OpenSearch — daily rolling index
# ============================================================
[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                ${OPENSEARCH_HOST}
    Port                ${OPENSEARCH_PORT}
    # TLS disabled — OpenSearch security plugin is off in this lab
    tls                 Off
    tls.verify          Off
    # Logstash_Format: appends date suffix → docker-logs-YYYY.MM.DD
    Logstash_Format     On
    Logstash_Prefix     docker-logs
    Logstash_DateFormat %Y.%m.%d
    # Generate a unique _id to avoid duplicate documents on retry
    Generate_ID         On
    # Replace dots in field names (OpenSearch does not allow dots in field names)
    Replace_Dots        On
    # Suppress 409 Conflict on duplicate _id — expected on retry
    Suppress_Type_Name  On
