# ============================================================
# Fluent Bit Configuration — Lab Infra AI + Big Data
# ============================================================
# Pipeline: Docker logs → parse JSON → enrich → OpenSearch
# Index:    docker-logs-YYYY.MM.DD  (daily rollover)
# Retention: 7 days via OpenSearch ISM policy
# ============================================================

[SERVICE]
    # How often Fluent Bit flushes buffers to outputs (seconds)
    Flush         5
    # Log level: off | error | warn | info | debug | trace
    Log_Level     warn
    # Daemon mode: off (Docker manages the process)
    Daemon        Off
    # Custom parsers file
    Parsers_File  /fluent-bit/etc/parsers_docker.conf
    # Health check endpoint
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================================
# INPUT: Tail all Docker container log files on this node
# ============================================================
[INPUT]
    Name              tail
    Tag               docker.*
    # Read ALL containers on this node
    Path              /var/lib/docker/containers/*/*.log
    # Use Docker JSON parser (defined in parsers_docker.conf)
    Parser            docker_json
    # State DB: remembers file offsets — survives restarts without re-reading
    DB                /fluent-bit/state/docker-tail.db
    # Skip lines longer than 512KB (avoids OOM on huge stack traces)
    Skip_Long_Lines   On
    # Refresh interval for new containers (seconds)
    Refresh_Interval  10
    # Buffer size per file
    Buffer_Max_Size   5MB
    # Do not read historical logs on first run — only new logs from now
    Read_from_Head    False

# ============================================================
# INPUT: Persistent lab health and reboot diagnostic reports
# ============================================================

[INPUT]
    Name              tail
    Tag               lab_health.*
    Path              /var/log/lab-health/reboot/*.txt
    Exclude_Path      /var/log/lab-health/reboot/*-latest.txt
    Key               log
    Path_Key          source_path
    DB                /fluent-bit/state/lab-health-tail.db
    Skip_Long_Lines   On
    Refresh_Interval  10
    Buffer_Max_Size   5MB
    Read_from_Head    True

# ============================================================
# FILTER 1: Add node hostname to every record
# HOSTNAME is injected by Docker from /etc/hostname bind mount
# ============================================================
[FILTER]
    Name         record_modifier
    Match        docker.*
    Record       node ${HOSTNAME}

# ============================================================
# FILTER 2: Extract container_id (first 12 chars) from tag
# Tag format: docker.var.lib.docker.containers.<full-id>.<full-id>-json
# The Lua script parses the tag and adds container_id field.
# ============================================================
[FILTER]
    Name         lua
    Match        docker.*
    call         extract_container_id
    code         function extract_container_id(tag, timestamp, record) local function pick(keys) for _, key in ipairs(keys) do local value = record[key]; if value ~= nil and value ~= "" then return value end end return nil end; local id = tag:match("containers%.([a-f0-9]+)%."); if id then record["container_id"] = string.sub(id, 1, 12) end; local labels = record["labels"]; local stack_label = nil; local service_label = nil; if type(labels) == "table" then stack_label = labels["com.docker.stack.namespace"] or labels["com_docker_stack_namespace"]; service_label = labels["com.docker.swarm.service.name"] or labels["com_docker_swarm_service_name"] end; local stack_name = pick({"com.docker.stack.namespace", "com_docker_stack_namespace"}); if stack_name == nil then stack_name = stack_label end; local service_name = pick({"com.docker.swarm.service.name", "com_docker_swarm_service_name"}); if service_name == nil then service_name = service_label end; local node_name = pick({"node"}); local container_name = pick({"container_name"}); local lab_env = os.getenv("LAB_ENV") or "lab"; if service_name then record["service.name"] = service_name end; if stack_name then record["stack.name"] = stack_name end; if node_name then record["node.name"] = node_name end; if container_name then record["container.name"] = container_name end; record["environment"] = lab_env; if stack_name and service_name then record["log.dataset"] = "docker." .. stack_name .. "." .. service_name elseif service_name then record["log.dataset"] = "docker." .. service_name elseif stack_name then record["log.dataset"] = "docker." .. stack_name else record["log.dataset"] = "docker.unknown" end; return 1, timestamp, record end

# ============================================================
# FILTER 3: Remove internal Fluent Bit partial-line flag
# _p is a Fluent Bit internal marker — not useful in OpenSearch
# ============================================================
[FILTER]
    Name         record_modifier
    Match        docker.*
    Remove_key   _p

# ============================================================
# FILTER: Enrich lab health records
# ============================================================

[FILTER]
    Name              record_modifier
    Match             lab_health.*
    Record            node ${HOSTNAME}
    Record            source_type lab-health
    Record            event_category reboot_diagnostics

# ============================================================
# OUTPUT: Lab health records into centralized docker-logs index
# ============================================================

[OUTPUT]
    Name               opensearch
    Match              lab_health.*
    Host               ${OPENSEARCH_HOST}
    Port               ${OPENSEARCH_PORT}
    tls                Off
    tls.verify         Off
    Logstash_Format    On
    Logstash_Prefix    docker-logs
    Logstash_DateFormat %Y.%m.%d
    Generate_ID        On
    Replace_Dots       On
    Suppress_Type_Name On

# ============================================================
# OUTPUT: OpenSearch — daily rolling index
# ============================================================
[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                ${OPENSEARCH_HOST}
    Port                ${OPENSEARCH_PORT}
    # TLS disabled — OpenSearch security plugin is off in this lab
    tls                 Off
    tls.verify          Off
    # Logstash_Format: appends date suffix → docker-logs-YYYY.MM.DD
    Logstash_Format     On
    Logstash_Prefix     docker-logs
    Logstash_DateFormat %Y.%m.%d
    # Generate a unique _id to avoid duplicate documents on retry
    Generate_ID         On
    # Replace dots in field names (OpenSearch does not allow dots in field names)
    Replace_Dots        On
    # Suppress 409 Conflict on duplicate _id — expected on retry
    Suppress_Type_Name  On
