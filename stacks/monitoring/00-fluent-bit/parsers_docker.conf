# ============================================================
# Custom Docker JSON Log Parser
# ============================================================
# Docker writes logs as JSON lines:
# {"log":"actual message\n","stream":"stdout","time":"2026-04-02T..."}
#
# This parser extracts:
#   - log     → the actual log message (renamed to message)
#   - stream  → stdout or stderr
#   - time    → Docker's timestamp → used as @timestamp in OpenSearch
# ============================================================

[PARSER]
    Name         docker_json
    Format       json
    # Use Docker's timestamp as the record timestamp
    Time_Key     time
    Time_Format  %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep    On
    # Decode_Field_As: decode escaped unicode in log field
    Decode_Field_As json log
