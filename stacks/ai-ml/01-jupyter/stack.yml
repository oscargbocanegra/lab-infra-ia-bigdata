version: "3.9"

# ============================================================
# Stack: JupyterLab - Entorno multi-usuario IA/ML/BigData
# ============================================================
# Usuarios:  ogiovanni (uid 1000) | odavid (uid 1001)
# Nodo:      master2 (tier=compute, GPU RTX 2080 Ti)
# Kernels:   Python LLM | Python IA | Python BigData (Spark)
# URLs:      https://jupyter-ogiovanni.sexydad
#            https://jupyter-odavid.sexydad
# Recursos:  reducidos a reservations realistas (lab compartido)
#            limits = máximo consumo bajo carga real
#
# ── MODELO GLOBAL ────────────────────────────────────────────
# JARVIS_MODEL se controla desde /etc/lab/lab.env en master1.
# Docker Swarm interpola ${LAB_JARVIS_MODEL} al hacer deploy.
# Fallback: qwen2.5-coder:14b — modelo especializado en código,
# ~25-30 tok/s vs ~16 tok/s de gemma4:26b. Ideal para uso interactivo.
#
# Para cambiar modelo SIN redeploy (opción rápida):
#   Portainer → Services → jupyter_jupyter_ogiovanni
#   → Environment → JARVIS_MODEL → Update
# ============================================================

configs:
  init_kernels_v4:
    file: ./init-kernels.sh
  entrypoint_v4:
    file: ./entrypoint.sh

networks:
  public:
    external: true
  internal:
    external: true

# ── Servicio base (x-extension) ──────────────────────────────
# Docker Swarm no soporta YAML anchors nativos en deploy.labels
# Usamos x- solo para documentar la intención; los dos servicios
# son explícitos para máxima claridad operativa.
# ─────────────────────────────────────────────────────────────

services:

  # ── ogiovanni ────────────────────────────────────────────────
  jupyter_ogiovanni:
    image: giovannotti/lab-jupyter:latest
    hostname: jupyter-ogiovanni
    healthcheck:
      disable: true

    environment:
      - JUPYTER_ENABLE_LAB=yes
      # GPU: acceso compartido con odavid y Ollama
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      # Spark: apuntar al master del cluster
      - SPARK_MASTER_URL=spark://spark_master:7077
      # AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY son exportadas por entrypoint.sh
      # leyendo /run/secrets/minio_access_key y /run/secrets/minio_secret_key
      # NO usar AWS_ACCESS_KEY_ID_FILE — boto3/s3fs/PySpark no reconocen ese sufijo
      # jupyter-ai: OLLAMA_HOST es la variable que realmente lee jupyter-ai/langchain-ollama
      # (OLLAMA_API_BASE era incorrecta — no la reconoce el provider de jupyter-ai)
      - OLLAMA_HOST=http://ollama:11434
      # JARVIS_MODEL: modelo usado por %%JARVIS y el chat panel
      # Se interpola desde LAB_JARVIS_MODEL en /etc/lab/lab.env al hacer deploy.
      # Para cambiar sin redeploy: Portainer → Services → Environment → JARVIS_MODEL
      - JARVIS_MODEL=${LAB_JARVIS_MODEL:-ollama:qwen2.5-coder:14b}

    volumes:
      - /srv/fastdata/jupyter/ogiovanni:/home/jovyan/work
      - /srv/fastdata/jupyter/ogiovanni/.local:/home/jovyan/.local
      - /srv/fastdata/jupyter/ogiovanni/.venv:/home/jovyan/.venv
      # Acceso lectura/escritura al datalake compartido
      - /srv/datalake/datasets:/home/jovyan/datasets:ro
      - /srv/datalake/notebooks:/home/jovyan/shared-notebooks
      - /srv/datalake/artifacts:/home/jovyan/artifacts

    configs:
      - source: init_kernels_v4
        target: /tmp/init-kernels.sh
        mode: 0755
      - source: entrypoint_v4
        target: /tmp/entrypoint.sh
        mode: 0755

    secrets:
      - minio_access_key
      - minio_secret_key

    networks:
      - public
      - internal

    command: >
      bash -c "/tmp/entrypoint.sh
      --ServerApp.ip=0.0.0.0
      --ServerApp.port=8888
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.allow_remote_access=True"

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == master2
          - node.labels.tier == compute
      resources:
        limits:
          cpus: '8.0'
          memory: 12G
        reservations:
          cpus: '2.0'
          memory: 4G
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.jupyter-ogiovanni.rule=Host(`jupyter-ogiovanni.sexydad`)
        - traefik.http.routers.jupyter-ogiovanni.entrypoints=websecure
        - traefik.http.routers.jupyter-ogiovanni.tls=true
        - traefik.http.routers.jupyter-ogiovanni.middlewares=jupyter-chain@docker
        - traefik.http.services.jupyter-ogiovanni.loadbalancer.server.port=8888

  # ── odavid ───────────────────────────────────────────────────
  jupyter_odavid:
    image: giovannotti/lab-jupyter:latest
    hostname: jupyter-odavid
    healthcheck:
      disable: true

    environment:
      - JUPYTER_ENABLE_LAB=yes
      # NOTE: NB_UID/NB_GID are NOT used here because entrypoint.sh bypasses the
      # image's start-notebook.sh where NB_UID is processed. Instead, the host
      # volume dirs must be owned by uid=1000 (jovyan) — see runbook_jupyter.md
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - SPARK_MASTER_URL=spark://spark_master:7077
      # AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY son exportadas por entrypoint.sh
      # leyendo /run/secrets/minio_access_key y /run/secrets/minio_secret_key
      # jupyter-ai: OLLAMA_HOST es la variable que realmente lee jupyter-ai/langchain-ollama
      # (OLLAMA_API_BASE era incorrecta — no la reconoce el provider de jupyter-ai)
      - OLLAMA_HOST=http://ollama:11434
      # JARVIS_MODEL: modelo usado por %%JARVIS y el chat panel
      # Se interpola desde LAB_JARVIS_MODEL en /etc/lab/lab.env al hacer deploy.
      # Para cambiar sin redeploy: Portainer → Services → Environment → JARVIS_MODEL
      - JARVIS_MODEL=${LAB_JARVIS_MODEL:-ollama:qwen2.5-coder:14b}

    volumes:
      - /srv/fastdata/jupyter/odavid:/home/jovyan/work
      - /srv/fastdata/jupyter/odavid/.local:/home/jovyan/.local
      - /srv/fastdata/jupyter/odavid/.venv:/home/jovyan/.venv
      - /srv/datalake/datasets:/home/jovyan/datasets:ro
      - /srv/datalake/notebooks:/home/jovyan/shared-notebooks
      - /srv/datalake/artifacts:/home/jovyan/artifacts

    configs:
      - source: init_kernels_v4
        target: /tmp/init-kernels.sh
        mode: 0755
      - source: entrypoint_v4
        target: /tmp/entrypoint.sh
        mode: 0755

    secrets:
      - minio_access_key
      - minio_secret_key

    networks:
      - public
      - internal

    command: >
      bash -c "/tmp/entrypoint.sh
      --ServerApp.ip=0.0.0.0
      --ServerApp.port=8888
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.allow_remote_access=True"

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == master2
          - node.labels.tier == compute
      resources:
        limits:
          cpus: '8.0'
          memory: 12G
        reservations:
          cpus: '2.0'
          memory: 4G
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.jupyter-odavid.rule=Host(`jupyter-odavid.sexydad`)
        - traefik.http.routers.jupyter-odavid.entrypoints=websecure
        - traefik.http.routers.jupyter-odavid.tls=true
        - traefik.http.routers.jupyter-odavid.middlewares=jupyter-chain@docker
        - traefik.http.services.jupyter-odavid.loadbalancer.server.port=8888

secrets:
  minio_access_key:
    external: true
  minio_secret_key:
    external: true
