version: "3.8"

# ============================================================
# Stack: Ollama - LLM Inference Engine
# ============================================================
# Purpose: GPU-accelerated LLM inference with persistent model storage
# Node: master2 (GPU RTX 2080 Ti)
# Networks: internal (backend), public (Traefik ingress)
# Security: LAN whitelist + BasicAuth
#
# UPGRADE HISTORY:
#   0.19.0  → latest  (2026-04) Required for Gemma 4 support (412 error fix)
# ============================================================

secrets:
  ollama_basicauth:
    external: true

services:
  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    
    networks:
      - internal
      - public
    
    volumes:
      # Persistent model storage on datalake (HDD)
      - type: bind
        source: /srv/datalake/models/ollama
        target: /root/.ollama
    
    secrets:
      - ollama_basicauth
    
    # Expose port directly on host — acceso por IP sin pasar por Traefik
    # http://192.168.80.200:11434 desde cualquier equipo de la red
    ports:
      - target: 11434
        published: 11434
        protocol: tcp
        mode: host
    
    environment:
      # Core Ollama Configuration
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
      
      # GPU Optimization
      # NUM_PARALLEL=1: single-user lab — no concurrent requests expected.
      # With gemma4:26b at 93% VRAM, each parallel slot reserves KV cache.
      # 4 slots → ~800MB wasted on idle slots. 1 slot → full VRAM for 1 request.
      - OLLAMA_NUM_PARALLEL=${LAB_OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=2         # Keep 2 models in VRAM simultaneously
      - OLLAMA_FLASH_ATTENTION=1           # Enable Flash Attention for faster inference
      
      # CUDA & GPU Settings
      - CUDA_VISIBLE_DEVICES=0             # Use first GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      
      # Memory Management (RTX 2080 Ti has 11GB VRAM)
      - OLLAMA_MAX_VRAM=10240              # Reserve 10GB for models (leave 1GB for system)
      # KV_CACHE_TYPE=q8_0: frees ~400MB vs f16 with negligible quality loss.
      # Gives gemma4:26b more headroom for longer context without VRAM eviction.
      - OLLAMA_KV_CACHE_TYPE=${LAB_OLLAMA_KV_CACHE_TYPE:-q8_0}
      
      # Performance Tuning
      - OLLAMA_NUM_GPU=1                   # Number of GPUs to use
      - OLLAMA_KEEP_ALIVE=5m               # Keep model loaded for 5 minutes after last request
      
      # Logging
      - OLLAMA_DEBUG=0
      - OLLAMA_LOGS=/root/.ollama/logs
    
    deploy:
      mode: replicated
      replicas: 1
      
      placement:
        constraints:
          - node.labels.tier == compute
          - node.labels.gpu == nvidia
      
      resources:
        reservations:
          cpus: '6.0'
          memory: 12G
        limits:
          cpus: '12.0'
          memory: 24G
      
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
        window: 120s
      
      labels:
        # Traefik routing
        - "traefik.enable=true"
        - "traefik.docker.network=public"
        
        # HTTP Router
        - "traefik.http.routers.ollama.rule=Host(`ollama.sexydad`)"
        - "traefik.http.routers.ollama.entrypoints=websecure"
        - "traefik.http.routers.ollama.tls=true"
        - "traefik.http.routers.ollama.service=ollama"
        
        # Service
        - "traefik.http.services.ollama.loadbalancer.server.port=11434"
        
        # Middleware: LAN whitelist + BasicAuth
        - "traefik.http.routers.ollama.middlewares=lan-whitelist@docker,ollama-auth@docker"
        
        # Health check
        - "traefik.http.services.ollama.loadbalancer.healthcheck.path=/api/tags"
        - "traefik.http.services.ollama.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.services.ollama.loadbalancer.healthcheck.timeout=10s"
        
        # Stack metadata
        - "com.docker.stack.namespace=ollama"
        - "com.docker.service.name=ollama"
        - "description=GPU-accelerated LLM inference with Ollama"

networks:
  internal:
    external: true
    name: internal
  
  public:
    external: true
    name: public
