version: "3.9"

# ============================================================
# Stack: Portainer CE - Docker Swarm Management UI
# ============================================================
# Purpose: Web UI to manage Docker Swarm cluster
# Agent: global (runs on ALL nodes: master1 + master2)
# Server: master1 (tier=control)
# URL: https://portainer.sexydad
# Version: 2.39.1
# ============================================================

networks:
  public:
    external: true
  internal:
    external: true

services:
  agent:
    image: portainer/agent:2.39.1
    networks:
      - internal
    deploy:
      mode: global
      restart_policy:
        condition: any
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host

  portainer:
    image: portainer/portainer-ce:2.39.1
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    networks:
      - public
      - internal
    volumes:
      # Persistencia en master1 (control plane) bajo /srv/fastdata/portainer
      - /srv/fastdata/portainer:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.portainer.rule=Host(`portainer.sexydad`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls=true
        - traefik.http.services.portainer.loadbalancer.server.port=9000
        - traefik.http.routers.portainer.middlewares=lan-whitelist@docker
        - "com.docker.stack.namespace=portainer"
        - "description=Portainer CE 2.39.1 - Docker Swarm management UI"
