version: "3.8"

# =============================================================================
# Stack: Traefik v2.11 — Reverse Proxy + TLS + Gateway
# =============================================================================
# Node:   control (master1)
# Ports:  80 (redirect→443), 443 (TLS, mode: host), 8082 (metrics, internal)
#
# Responsibilities:
#   - TLS termination (self-signed cert via Swarm Secrets)
#   - LAN-only whitelist (restricts access to internal network)
#   - Routing to all cluster services
#   - BasicAuth middlewares referenced by each stack
#   - Prometheus metrics endpoint on :8082 (internal only, not exposed via Traefik)
#
# Note on Traefik secrets:
#   Traefik MUST have all BasicAuth secrets mounted because other stacks
#   reference them as @docker middlewares — Traefik is the one executing them.
# =============================================================================

networks:
  public:
    external: true
  internal:
    external: true

secrets:
  # Traefik own credentials
  traefik_basic_auth:
    external: true
  traefik_tls_cert:
    external: true
  traefik_tls_key:
    external: true
  # Service BasicAuth secrets (executed by Traefik middleware)
  jupyter_basicauth_v2:
    external: true
  ollama_basicauth:
    external: true
  opensearch_basicauth:
    external: true
  dashboards_basicauth:
    external: true
  # Monitoring secrets
  prometheus_basicauth:
    external: true
  grafana_admin_user:
    external: true
  grafana_admin_password:
    external: true

configs:
  traefik_dynamic:
    file: ./dynamic.yml

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.dashboard=true
      - --api.insecure=false

      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=public

      - --providers.file=true
      - --providers.file.filename=/etc/traefik/dynamic.yml

      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https

      - --entrypoints.websecure.address=:443

      # Prometheus metrics endpoint — internal only, not exposed via Traefik router
      - --metrics.prometheus=true
      - --metrics.prometheus.entryPoint=metrics
      - --entrypoints.metrics.address=:8082

      - --accesslog=true
      - --log.level=INFO

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      # Port 8082 (metrics) is NOT published to host — only reachable via overlay

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - public
      - internal

    configs:
      - source: traefik_dynamic
        target: /etc/traefik/dynamic.yml

    secrets:
      - traefik_basic_auth
      - traefik_tls_cert
      - traefik_tls_key
      - jupyter_basicauth_v2
      - ollama_basicauth
      - opensearch_basicauth
      - dashboards_basicauth
      - prometheus_basicauth
      - grafana_admin_user
      - grafana_admin_password

    deploy:
      placement:
        constraints:
          - node.labels.tier == control
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s
      labels:
        - traefik.enable=true

        # Traefik dashboard
        - traefik.http.routers.traefik.rule=Host(`traefik.sexydad`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
        - traefik.http.routers.traefik.entrypoints=websecure
        - traefik.http.routers.traefik.tls=true
        - traefik.http.routers.traefik.service=traefik-dashboard
        - traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080
        - traefik.http.routers.traefik.middlewares=lan-whitelist@docker,traefik-auth@docker

        # Global network middlewares
        - traefik.http.middlewares.lan-whitelist.ipwhitelist.sourcerange=192.168.80.0/24
        - traefik.http.middlewares.lan-allow.ipwhitelist.sourcerange=192.168.80.0/24

        # Auth middlewares
        - traefik.http.middlewares.traefik-auth.basicauth.usersfile=/run/secrets/traefik_basic_auth
        - traefik.http.middlewares.jupyter-auth.basicauth.usersfile=/run/secrets/jupyter_basicauth_v2
        - traefik.http.middlewares.jupyter-chain.chain.middlewares=lan-allow,jupyter-auth
        - traefik.http.middlewares.ollama-auth.basicauth.usersfile=/run/secrets/ollama_basicauth
        - traefik.http.middlewares.opensearch-auth.basicauth.usersfile=/run/secrets/opensearch_basicauth
        - traefik.http.middlewares.dashboards-auth.basicauth.usersfile=/run/secrets/dashboards_basicauth
        - traefik.http.middlewares.prometheus-auth.basicauth.usersfile=/run/secrets/prometheus_basicauth
