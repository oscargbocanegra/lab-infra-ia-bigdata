version: "3.9"

# ============================================================
# Stack: PostgreSQL 16 + pgvector — Central database cluster
# ============================================================
# Node:    master2 (hostname=master2, NVMe /srv/fastdata/postgres)
# Port:    5432 (mode: host — accessible from master2 LAN only)
#
# Managed databases:
#   postgres  → superuser (admin)
#   n8n       → workflow automation (n8n)
#   airflow   → DAG and task metadata (Apache Airflow)
#   rag       → vector embeddings and document metadata (RAG pipelines)
#
# Required secrets (external, create before deploy):
#   pg_super_pass       → superuser 'postgres' password
#   pg_n8n_pass         → user 'n8n' password
#   pg_airflow_pass     → user 'airflow' password
#   pg_rag_pass         → user 'rag' password
#
# Init scripts (executed once on empty volume):
#   01-init-n8n.sh      → creates role+db n8n
#   02-init-airflow.sh  → creates role+db airflow
#   03-init-rag.sh      → creates role+db rag + pgvector extension + schema
#
# Image: pgvector/pgvector:pg16 — drop-in replacement for postgres:16
#        adds the pgvector extension. Fully compatible with existing data.
# ============================================================

networks:
  internal:
    external: true

secrets:
  pg_super_pass:
    external: true
  pg_n8n_pass:
    external: true
  pg_airflow_pass:
    external: true
  pg_rag_pass:
    external: true

configs:
  init_n8n:
    file: ./initdb/01-init-n8n.sh
  init_airflow:
    file: ./initdb/02-init-airflow.sh
  init_rag:
    file: ./initdb/03-init-rag.sh

services:
  postgres:
    image: pgvector/pgvector:pg16

    environment:
      # Default DB: neutral 'postgres' superuser (not tied to any app)
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_super_pass
      # Standard locale for cross-app compatibility
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      TZ: America/Bogota
      PGTZ: America/Bogota

    secrets:
      - pg_super_pass
      - pg_n8n_pass
      - pg_airflow_pass
      - pg_rag_pass

    configs:
      - source: init_n8n
        target: /docker-entrypoint-initdb.d/01-init-n8n.sh
        mode: 0555
      - source: init_airflow
        target: /docker-entrypoint-initdb.d/02-init-airflow.sh
        mode: 0555
      - source: init_rag
        target: /docker-entrypoint-initdb.d/03-init-rag.sh
        mode: 0555

    volumes:
      - /srv/fastdata/postgres:/var/lib/postgresql/data

    networks:
      - internal

    ports:
      # mode: host → binds to master2 only, bypasses Swarm routing mesh
      # LAN access: 192.168.80.200:5432 (DBeaver, psql, app containers)
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == master2
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0   # infinite retries — critical for the cluster
        window: 60s
