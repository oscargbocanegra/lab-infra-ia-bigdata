version: "3.9"

# ============================================================
# Stack: Apache Airflow 2.9 — Orquestación de pipelines
# ============================================================
# Executor: CeleryExecutor (workers distribuidos vía Redis)
# Broker:   Redis 7 (in-memory queue para tareas Celery)
#
# Componentes:
#   airflow_webserver  → master1 (UI + API REST)
#   airflow_scheduler  → master1 (planifica DAGs)
#   airflow_worker     → master2 (ejecuta tareas, acceso a GPU/data)
#   airflow_flower     → master1 (monitor de Celery workers)
#   redis              → master1 (broker de mensajes)
#
# Base de datos metadata: PostgreSQL en master2 (DB: airflow)
#
# DAGs: montados desde /srv/fastdata/airflow/dags (master1)
#       También accesible en master2 para el worker
#
# URLs:
#   https://airflow.sexydad       → Webserver UI
#   https://airflow-flower.sexydad → Flower (monitor workers)
#
# Secrets requeridos:
#   pg_airflow_pass         → password DB airflow en Postgres
#   airflow_fernet_key      → clave Fernet para encrypt connections
#   airflow_webserver_secret→ secret key Flask webserver
#   minio_access_key        → para logs remotos en MinIO
#   minio_secret_key
#
# Directorios en master1 (crear antes de deploy):
#   /srv/fastdata/airflow/dags
#   /srv/fastdata/airflow/logs
#   /srv/fastdata/airflow/plugins
#
# Directorios en master2 (para el worker):
#   /srv/fastdata/airflow/dags   (mismo path — sincronizar o montar NFS)
# ============================================================

networks:
  public:
    external: true
  internal:
    external: true

secrets:
  pg_airflow_pass:
    external: true
  airflow_fernet_key:
    external: true
  airflow_webserver_secret:
    external: true
  airflow_admin_password:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true

configs:
  airflow_entrypoint_v4:
    file: ./airflow-entrypoint.sh

# ── Variables de entorno comunes a todos los componentes ─────
# Airflow 2.9 con Docker Swarm secrets:
#   - Secrets montados en /run/secrets/<nombre>
#   - AIRFLOW__*__*_SECRET_PATH vars leen archivos (sufijo __FILE no aplica aquí)
#   - Para SQL_ALCHEMY_CONN y RESULT_BACKEND: usamos wrapper command que lee secrets
#     y los exporta como env vars ANTES de ejecutar el proceso Airflow.
#   - El wrapper se define en cada servicio para no mezclar lógica de shell con YAML.
x-airflow-common-env: &airflow-env
  # ── Executor ──────────────────────────────────────────────
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0

  # ── Comportamiento general ────────────────────────────────
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Bogota
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Bogota

  # ── Logs remotos en MinIO ─────────────────────────────────
  # IMPORTANTE: deshabilitado para el primer deploy (chicken-and-egg).
  # Para habilitarlo después:
  #   1. Bucket "airflow-logs" ya existe en MinIO
  #   2. Crear conexión "minio_s3" en Airflow UI (Admin > Connections)
  #      conn_type=Amazon S3, extra={"endpoint_url":"http://minio:9000"}
  #   3. Cambiar REMOTE_LOGGING a "true" y hacer service update
  AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://airflow-logs/
  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: minio_s3
  AIRFLOW__LOGGING__ENCRYPT_S3_LOGS: "false"

  # ── URL pública ───────────────────────────────────────────
  AIRFLOW__WEBSERVER__BASE_URL: https://airflow.sexydad

  # ── Privacidad / telemetría ───────────────────────────────
  AIRFLOW__USAGE_DATA_COLLECTION__ENABLED: "false"

x-airflow-common-secrets: &airflow-secrets
  - pg_airflow_pass
  - airflow_fernet_key
  - airflow_webserver_secret
  - airflow_admin_password
  - minio_access_key
  - minio_secret_key

x-airflow-common-volumes-master1: &airflow-volumes-master1
  - /srv/fastdata/airflow/dags:/opt/airflow/dags
  - /srv/fastdata/airflow/logs:/opt/airflow/logs
  - /srv/fastdata/airflow/plugins:/opt/airflow/plugins

x-airflow-common-volumes-master2: &airflow-volumes-master2
  - /srv/fastdata/airflow/dags:/opt/airflow/dags
  - /srv/fastdata/airflow/logs:/opt/airflow/logs
  - /srv/fastdata/airflow/plugins:/opt/airflow/plugins
  # Acceso al datalake para tareas que procesan datos
  - /srv/datalake/datasets:/data/datasets
  - /srv/datalake/artifacts:/data/artifacts

services:

  # ── Redis — Message Broker para Celery ───────────────────────
  redis:
    image: redis:7.2-alpine
    hostname: redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - /srv/fastdata/airflow/redis:/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s

  # ── Airflow DB Init — job único que prepara el schema ────────
  # IMPORTANTE: corre una sola vez, luego queda con 0 replicas
  # Ejecutar manualmente: docker service scale airflow_airflow_init=1
  # Luego verificar con:  docker service logs airflow_airflow_init -f
  # Una vez terminado:    docker service scale airflow_airflow_init=0
  airflow_init:
    image: apache/airflow:2.9.3
    hostname: airflow-init
    entrypoint: ["/airflow-entrypoint.sh"]
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@lab.local \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" &&
        echo "Airflow DB initialized and admin user created OK"
    environment:
      <<: *airflow-env
      # Modo especial para init
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
    secrets: *airflow-secrets
    volumes: *airflow-volumes-master1
    configs:
      - source: airflow_entrypoint_v4
        target: /airflow-entrypoint.sh
        mode: 0755
    networks:
      - internal
    deploy:
      replicas: 0    # NO arranca automáticamente — ejecutar manualmente para init
      placement:
        constraints:
          - node.labels.tier == control
      restart_policy:
        condition: none

  # ── Airflow Webserver ────────────────────────────────────────
  airflow_webserver:
    image: apache/airflow:2.9.3
    hostname: airflow-webserver
    entrypoint: ["/airflow-entrypoint.sh"]
    command: ["airflow", "webserver"]
    environment: *airflow-env
    secrets: *airflow-secrets
    volumes: *airflow-volumes-master1
    configs:
      - source: airflow_entrypoint_v4
        target: /airflow-entrypoint.sh
        mode: 0755
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.airflow.rule=Host(`airflow.sexydad`)
        - traefik.http.routers.airflow.entrypoints=websecure
        - traefik.http.routers.airflow.tls=true
        - traefik.http.routers.airflow.service=airflow
        - traefik.http.services.airflow.loadbalancer.server.port=8080
        - traefik.http.routers.airflow.middlewares=lan-whitelist@docker
        - traefik.http.services.airflow.loadbalancer.healthcheck.path=/health
        - traefik.http.services.airflow.loadbalancer.healthcheck.interval=30s
        - "com.docker.stack.namespace=airflow"
        - "description=Airflow Webserver UI"

  # ── Airflow Scheduler ────────────────────────────────────────
  airflow_scheduler:
    image: apache/airflow:2.9.3
    hostname: airflow-scheduler
    entrypoint: ["/airflow-entrypoint.sh"]
    command: ["airflow", "scheduler"]
    environment: *airflow-env
    secrets: *airflow-secrets
    volumes: *airflow-volumes-master1
    configs:
      - source: airflow_entrypoint_v4
        target: /airflow-entrypoint.sh
        mode: 0755
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "[ -f /proc/1/status ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 3
        window: 120s

  # ── Airflow Worker (Celery) ──────────────────────────────────
  airflow_worker:
    image: apache/airflow:2.9.3
    hostname: airflow-worker
    entrypoint: ["/airflow-entrypoint.sh"]
    command: ["airflow", "celery", "worker"]
    environment:
      <<: *airflow-env
      # El worker en master2 tiene acceso a GPU y datalake
      DUMB_INIT_SETSID: "0"
    secrets: *airflow-secrets
    volumes: *airflow-volumes-master2
    configs:
      - source: airflow_entrypoint_v4
        target: /airflow-entrypoint.sh
        mode: 0755
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "[ -f /proc/1/status ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          # Ejecutar en master2: acceso a GPU, NVMe, datalake HDD
          - node.labels.tier == compute
          - node.hostname == master2
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 3
        window: 120s

  # ── Flower — Monitor de Celery Workers ───────────────────────
  airflow_flower:
    image: apache/airflow:2.9.3
    hostname: airflow-flower
    entrypoint: ["/airflow-entrypoint.sh"]
    command: ["airflow", "celery", "flower"]
    environment:
      <<: *airflow-env
      FLOWER_PORT: "5555"
    secrets: *airflow-secrets
    volumes: *airflow-volumes-master1
    configs:
      - source: airflow_entrypoint_v4
        target: /airflow-entrypoint.sh
        mode: 0755
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == control
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 3
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.http.routers.airflow-flower.rule=Host(`airflow-flower.sexydad`)
        - traefik.http.routers.airflow-flower.entrypoints=websecure
        - traefik.http.routers.airflow-flower.tls=true
        - traefik.http.routers.airflow-flower.service=airflow-flower
        - traefik.http.services.airflow-flower.loadbalancer.server.port=5555
        - traefik.http.routers.airflow-flower.middlewares=lan-whitelist@docker
        - "com.docker.stack.namespace=airflow"
        - "description=Celery Flower worker monitor"
