# =============================================================================
# ci.yml — Continuous Integration
# =============================================================================
# Runs on every push and pull request to main.
# Executes on GitHub-hosted runners (free) — does NOT touch the cluster.
#
# Jobs:
#   lint   : ruff check + format check on all Python sources
#   test   : pytest for lab-rag-api and lab-agent (all backends mocked)
#
# No secrets required — this workflow is safe for a public repository.
# =============================================================================

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — ruff check + format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.9.10

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Job 2: Test — lab-rag-api
  # ---------------------------------------------------------------------------
  test-rag-api:
    name: Tests — lab-rag-api
    runs-on: ubuntu-latest
    # Run after lint passes — no point testing broken code
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install RAG API dependencies + test tooling
        run: |
          pip install \
            fastapi==0.115.12 \
            uvicorn[standard]==0.34.0 \
            httpx==0.28.1 \
            qdrant-client==1.13.3 \
            psycopg2-binary==2.9.10 \
            asyncpg==0.30.0 \
            pgvector==0.3.6 \
            sqlalchemy==2.0.40 \
            minio==7.2.15 \
            python-multipart==0.0.20 \
            pydantic==2.11.3 \
            pydantic-settings==2.8.1 \
            tiktoken==0.9.0 \
            langchain-text-splitters==0.3.8 \
            python-docx==1.1.2 \
            pypdf==5.4.0 \
            pytest==8.3.5 \
            pytest-asyncio==0.25.3 \
            pytest-mock==3.14.0

      - name: Run RAG API tests
        run: pytest tests/rag_api/ -v
        env:
          # Point to non-existent services — tests use mocks, never real connections
          QDRANT_URL: "http://localhost:6333"
          PG_HOST: "localhost"
          OLLAMA_BASE_URL: "http://localhost:11434"
          MINIO_ENDPOINT: "localhost:9000"
          LOG_LEVEL: "WARNING"

  # ---------------------------------------------------------------------------
  # Job 3: Test — lab-agent
  # ---------------------------------------------------------------------------
  test-agent:
    name: Tests — lab-agent
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Agent dependencies + test tooling
        run: |
          pip install \
            fastapi==0.115.12 \
            uvicorn[standard]==0.34.0 \
            httpx==0.28.1 \
            pydantic==2.11.3 \
            pydantic-settings==2.8.1 \
            langgraph==0.3.21 \
            langchain-core==0.3.52 \
            langchain-community==0.3.21 \
            qdrant-client==1.13.3 \
            asyncpg==0.30.0 \
            sqlalchemy==2.0.40 \
            opensearch-py==2.8.0 \
            python-multipart==0.0.20 \
            pytest==8.3.5 \
            pytest-asyncio==0.25.3 \
            pytest-mock==3.14.0

      - name: Run Agent tests
        run: pytest tests/agent/ -v
        env:
          OLLAMA_BASE_URL: "http://localhost:11434"
          QDRANT_URL: "http://localhost:6333"
          PG_HOST: "localhost"
          OPENSEARCH_HOST: "localhost"
          LOG_LEVEL: "WARNING"
